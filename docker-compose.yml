services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio
      POSTGRES_DB: studio
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  scene-generator:
    build:
      context: .
      dockerfile: services/scene_generator/Dockerfile
    ports:
      - "8000:8000"
    environment:
      STUDIO_DATABASE_URL: "postgresql+asyncpg://studio:studio@postgres:5432/studio"
      STUDIO_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      STUDIO_SERVICE_NAME: "scene-generator"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  controller:
    build:
      context: .
      dockerfile: services/controller/Dockerfile
    environment:
      STUDIO_DATABASE_URL: "postgresql+asyncpg://studio:studio@postgres:5432/studio"
      STUDIO_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      STUDIO_SERVICE_NAME: "controller"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  blender-worker:
    build:
      context: .
      dockerfile: services/blender_worker/Dockerfile
    environment:
      STUDIO_DATABASE_URL: "postgresql+asyncpg://studio:studio@postgres:5432/studio"
      STUDIO_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      STUDIO_FRAME_STORAGE_PATH: "/data/frames"
      STUDIO_SERVICE_NAME: "blender-worker"
    volumes:
      - frame-storage:/data/frames
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  reward:
    build:
      context: .
      dockerfile: services/reward/Dockerfile
    environment:
      STUDIO_DATABASE_URL: "postgresql+asyncpg://studio:studio@postgres:5432/studio"
      STUDIO_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      STUDIO_FRAME_STORAGE_PATH: "/data/frames"
      STUDIO_SERVICE_NAME: "reward"
    volumes:
      - frame-storage:/data/frames
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres-data:
  frame-storage:
