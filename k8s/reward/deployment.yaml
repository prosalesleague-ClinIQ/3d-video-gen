apiVersion: apps/v1
kind: Deployment
metadata:
  name: reward
  namespace: studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reward
  template:
    metadata:
      labels:
        app: reward
    spec:
      containers:
        - name: reward
          image: studio/reward:latest
          env:
            - name: STUDIO_DATABASE_URL
              value: "postgresql+asyncpg://studio:studio@postgres:5432/studio"
            - name: STUDIO_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: STUDIO_FRAME_STORAGE_PATH
              value: "/data/frames"
            - name: STUDIO_SERVICE_NAME
              value: "reward"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: frame-storage
              mountPath: /data/frames
      volumes:
        - name: frame-storage
          persistentVolumeClaim:
            claimName: frame-storage-pvc
